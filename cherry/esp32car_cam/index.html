<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/hint.css/2.7.0/hint.min.css">
    <h1>🚗 ESP32 小车 + 摄像头控制</h1>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">未连接</span>
    </div>

    <!-- 主布局：左右并排 -->
    <div class="main-container">
        <!-- 左侧：控制按键 -->
        <div class="left-panel">
            <div class="config-panel">
                <div class="input-group">
                    <input type="text" id="wsAddress" placeholder="ESP32控制IP" value="">
                    <button id="connectBtn" onclick="toggleConnection()">连接小车</button>
                </div>
                <div class="input-group">
                    <input type="text" id="camAddress" placeholder="摄像头IP (如 192.168.1.106)" value="">
                    <button onclick="applyCamStream()">启用视频</button>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-btn empty"></div>
                <button class="control-btn" id="btnForward" onmousedown="sendCmd('forward')" onmouseup="sendCmd('stop')" ontouchstart="sendCmd('forward'); event.preventDefault();" ontouchend="sendCmd('stop'); event.preventDefault();">▲</button>
                <div class="control-btn empty"></div>

                <button class="control-btn" id="btnLeft" onmousedown="sendCmd('left')" onmouseup="sendCmd('stop')" ontouchstart="sendCmd('left'); event.preventDefault();" ontouchend="sendCmd('stop'); event.preventDefault();">◀</button>
                <button class="control-btn stop-btn" id="btnStop" onclick="sendCmd('stop')">⏹</button>
                <button class="control-btn" id="btnRight" onmousedown="sendCmd('right')" onmouseup="sendCmd('stop')" ontouchstart="sendCmd('right'); event.preventDefault();" ontouchend="sendCmd('stop'); event.preventDefault();">▶</button>

                <div class="control-btn empty"></div>
                <button class="control-btn" id="btnBackward" onmousedown="sendCmd('backward')" onmouseup="sendCmd('stop')" ontouchstart="sendCmd('backward'); event.preventDefault();" ontouchend="sendCmd('stop'); event.preventDefault();">▼</button>
                <div class="control-btn empty"></div>
            </div>

            <div class="command-panel">
                <div class="speed-control">
                    <div class="speed-label">
                        <span>速度控制</span>
                        <span class="speed-value" id="speedValue">127</span>
                    </div>
                    <input type="range" id="speedSlider" min="0" max="255" value="127">
                </div>

                <div class="panel-title">自定义指令</div>
                <div class="cmd-input-group">
                    <input type="text" id="cmdInput" placeholder="输入指令" onkeypress="if(event.key==='Enter')sendCustomCmd()">
                    <button class="cmd-btn" onclick="sendCustomCmd()">发送</button>
                </div>
            </div>
        </div>

        <!-- 右侧：视频流 -->
        <div class="right-panel">
            <div class="stream-label">📹 ESP32-CAM 实时视频</div>
            <div class="stream-container">
                <!-- 提示文字：默认显示，居中 -->
                <div class="stream-tip" id="streamTip">
                    📷 视频流未连接
                </div>
                <!-- 图片：默认隐藏，加载成功再显示 -->
                <img id="stream" src="" style="display: none;">
            </div>
        </div>
    </div>

    <!-- 日志 -->
    <div class="log-panel" id="logPanel">
        <div class="log-entry"><span class="log-time">[系统]</span> 等待连接...</div>
    </div>

    <script>
        const WS_PORT = 81;
        const MAX_LOG_ENTRIES = 50;
        let ws = null;
        let isConnected = false;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const wsAddress = document.getElementById('wsAddress');
        const camAddress = document.getElementById('camAddress');
        const streamImg = document.getElementById('stream');
        const connectBtn = document.getElementById('connectBtn');
        const logPanel = document.getElementById('logPanel');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const streamTip = document.getElementById('streamTip');

        // 日志
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let typeClass = '', prefix = '';
            switch (type) {
                case 'send': typeClass = 'log-send'; prefix = '发送'; break;
                case 'recv': typeClass = 'log-recv'; prefix = '接收'; break;
                case 'error': typeClass = 'log-error'; prefix = '错误'; break;
                default: prefix = '信息';
            }
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${prefix}</span>: ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            while (logPanel.children.length > MAX_LOG_ENTRIES) logPanel.removeChild(logPanel.firstChild);
        }

        // 应用视频流地址
        function applyCamStream() {
            const ip = document.getElementById('camAddress').value.trim();
            if (!ip) {
                streamTip.textContent = '请输入摄像头IP';
                return;
            }

            // 1. 加载前：显示“连接中”提示，隐藏图片
            streamTip.style.display = 'block';
            streamTip.textContent = '⏳ 正在连接视频流...';
            streamImg.style.display = 'none';

            // 2. 给图片加时间戳防缓存
            streamImg.src = `http://${ip}:81/stream?t=${Date.now()}`;

            // 3. 加载成功：隐藏提示，显示图片
            streamImg.onload = function() {
                streamTip.style.display = 'none';
                streamImg.style.display = 'block';
            };

            // 4. 加载失败：显示错误提示，隐藏图片
            streamImg.onerror = function() {
                streamTip.style.display = 'block';
                streamTip.innerHTML = '❌ 视频流加载失败<br>请检查IP地址或设备状态';
                streamImg.style.display = 'none';
            };
        }

        // WebSocket 连接
        function connect() {
            const ip = wsAddress.value.trim();
            if (!ip) { log('请输入ESP32 IP', 'error'); return; }
            const wsUrl = `ws://${ip}:${WS_PORT}`;
            log(`正在连接: ${wsUrl}`);
            
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                isConnected = true;
                updateStatus(true);
                connectBtn.textContent = '断开';
                log('连接成功', 'recv');
                sendCmd('status');
            };
            ws.onmessage = (e) => {
                log(e.data, 'recv');
                const match = e.data.match(/ok: speed changed to (\d+)/);
                if (match) {
                    const s = parseInt(match[1]);
                    speedSlider.value = s;
                    speedValue.textContent = s;
                }
            };
            ws.onclose = () => {
                isConnected = false;
                updateStatus(false);
                connectBtn.textContent = '连接';
            };
            ws.onerror = (err) => log('连接失败', 'error');
        }

        function disconnect() { if (ws) ws.close(); }
        function toggleConnection() { isConnected ? disconnect() : connect(); }
        function updateStatus(c) {
            c ? (statusDot.classList.add('connected'), statusText.textContent = '已连接')
               : (statusDot.classList.remove('connected'), statusText.textContent = '未连接');
        }

        // 发送指令
        function sendCmd(cmd) {
            if (!isConnected || !ws) { log('未连接', 'error'); return; }
            ws.send(cmd);
            log(cmd, 'send');
        }

        // 速度
        speedSlider.addEventListener('input', () => speedValue.textContent = speedSlider.value);
        speedSlider.addEventListener('change', () => {
            const s = speedSlider.value;
            if (isConnected) { ws.send(`chgspeed:${s}`); log(`chgspeed:${s}`, 'send'); }
        });

        // 自定义指令
        function sendCustomCmd() {
            const cmd = document.getElementById('cmdInput').value.trim();
            if (!cmd || !isConnected) return;
            ws.send(cmd);
            log(cmd, 'send');
            document.getElementById('cmdInput').value = '';
        }

        // 初始化
        window.addEventListener('load', () => {
            const savedIp = localStorage.getItem('esp32_ip');
            if (savedIp) wsAddress.value = savedIp;
            
            const savedCam = localStorage.getItem('cam_ip');
            if (savedCam) {
                camAddress.value = savedCam;
                applyCamStream();
            }
            
            log('页面已加载，可输入IP连接');
        });

        wsAddress.addEventListener('change', () => localStorage.setItem('esp32_ip', wsAddress.value));
    </script>
