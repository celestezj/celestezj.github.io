<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESP32 小车控制 + 摄像头</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-text {
            font-size: 14px;
            color: #ccc;
        }

        /* 主容器：横屏左右布局 */
        .main-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 左侧：控制区域 */
        .left-panel {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 右侧：视频区域 */
        .right-panel {
            flex: 1;
            min-width: 280px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .config-panel {
            width: 100%;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: background 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* 视频流样式 */
        .stream-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
        }

        #stream {
            width: 100%;
            height: 100%;
            /*object-fit: cover;*/
            object-fit: contain;
            display: block;
        }

        .stream-label {
            text-align: center;
            font-size: 14px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-bottom: 15px;
        }

        .control-btn {
            aspect-ratio: 1;
            padding: 0;
            font-size: 22px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
        }

        .control-btn:hover {
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .control-btn:active {
            background: linear-gradient(135deg, #00a8cc 0%, #5a1f8a 100%);
        }

        .control-btn.empty {
            background: transparent;
            pointer-events: none;
        }

        .control-btn.empty:hover {
            box-shadow: none;
        }

        .stop-btn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%) !important;
        }

        .stop-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 65, 108, 0.4) !important;
        }

        /* 指令输入和速度 */
        .command-panel {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .speed-control {
            margin-bottom: 12px;
        }

        .speed-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ccc;
        }

        .speed-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
            color: #fff;
            min-width: 45px;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            height: 7px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .cmd-input-group {
            display: flex;
            gap: 8px;
        }

        /* 日志 */
        .log-panel {
            width: 100%;
            max-width: 700px;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
        }

        .log-entry {
            margin-bottom: 2px;
            padding: 1px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-time { color: #666; }
        .log-send { color: #00d4ff; }
        .log-recv { color: #00ff88; }
        .log-error { color: #ff4444; }

        /* 手机横屏优化 */
        @media (max-width: 768px) and (orientation: landscape) {
            body { padding: 5px; }
            h1 { font-size: 18px; margin-bottom: 5px; }
            .main-container { gap: 10px; }
            .control-panel { max-width: 240px; gap: 10px; }
            .control-btn { font-size: 18px; }
            .stream-container { aspect-ratio: 16/9; }
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .main-container { flex-direction: column; }
            h1 { font-size: 20px; }
        }
        .stream-container {
            position: relative; /* 让内部文字可以居中 */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .stream-tip {
            /* 让文字在容器中垂直水平居中 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 18px;
            text-align: center;
            z-index: 10; /* 确保文字在图片上面 */
        }

        #stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 关键：屏蔽浏览器默认的错误图标 */
            content: none;
        }
    </style>
</head>
<body>
    <h1>🚗 ESP32 小车 + 摄像头控制</h1>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">未连接</span>
    </div>

    <!-- 主布局：左右并排 -->
    <div class="main-container">
        <!-- 左侧：控制按键 -->
        <div class="left-panel">
            <div class="config-panel">
                <div class="input-group">
                    <input type="text" id="wsAddress" placeholder="ESP32控制IP" value="">
                    <button id="connectBtn" onclick="toggleConnection()">连接小车</button>
                </div>
                <div class="input-group">
                    <input type="text" id="camAddress" placeholder="摄像头IP (如 192.168.1.106)" value="">
                    <button onclick="applyCamStream()">启用视频</button>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-btn empty"></div>
                <button class="control-btn" id="btnForward"
                    onmousedown="sendCmd('forward')"
                    onmouseup="sendCmd('stop')"
                    ontouchstart="sendCmd('forward'); event.preventDefault();"
                    ontouchend="sendCmd('stop'); event.preventDefault();">▲</button>
                <div class="control-btn empty"></div>

                <button class="control-btn" id="btnLeft"
                    onmousedown="sendCmd('left')"
                    onmouseup="sendCmd('stop')"
                    ontouchstart="sendCmd('left'); event.preventDefault();"
                    ontouchend="sendCmd('stop'); event.preventDefault();">◀</button>
                <button class="control-btn stop-btn" id="btnStop" onclick="sendCmd('stop')">⏹</button>
                <button class="control-btn" id="btnRight"
                    onmousedown="sendCmd('right')"
                    onmouseup="sendCmd('stop')"
                    ontouchstart="sendCmd('right'); event.preventDefault();"
                    ontouchend="sendCmd('stop'); event.preventDefault();">▶</button>

                <div class="control-btn empty"></div>
                <button class="control-btn" id="btnBackward"
                    onmousedown="sendCmd('backward')"
                    onmouseup="sendCmd('stop')"
                    ontouchstart="sendCmd('backward'); event.preventDefault();"
                    ontouchend="sendCmd('stop'); event.preventDefault();">▼</button>
                <div class="control-btn empty"></div>
            </div>

            <div class="command-panel">
                <div class="speed-control">
                    <div class="speed-label">
                        <span>速度控制</span>
                        <span class="speed-value" id="speedValue">127</span>
                    </div>
                    <input type="range" id="speedSlider" min="0" max="255" value="127">
                </div>

                <div class="panel-title">自定义指令</div>
                <div class="cmd-input-group">
                    <input type="text" id="cmdInput" placeholder="输入指令" onkeypress="if(event.key==='Enter')sendCustomCmd()">
                    <button class="cmd-btn" onclick="sendCustomCmd()">发送</button>
                </div>
            </div>
        </div>

        <!-- 右侧：视频流 -->
        <div class="right-panel">
            <div class="stream-label">📹 ESP32-CAM 实时视频</div>
            <div class="stream-container">
                <!-- 提示文字：默认显示，居中 -->
                <div class="stream-tip" id="streamTip">
                    📷 视频流未连接
                </div>
                <!-- 图片：默认隐藏，加载成功再显示 -->
                <img id="stream" src="" style="display: none;">
            </div>
        </div>
    </div>

    <!-- 日志 -->
    <div class="log-panel" id="logPanel">
        <div class="log-entry"><span class="log-time">[系统]</span> 等待连接...</div>
    </div>

    <script>
        const WS_PORT = 81;
        const MAX_LOG_ENTRIES = 50;
        let ws = null;
        let isConnected = false;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const wsAddress = document.getElementById('wsAddress');
        const camAddress = document.getElementById('camAddress');
        const streamImg = document.getElementById('stream');
        const connectBtn = document.getElementById('connectBtn');
        const logPanel = document.getElementById('logPanel');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const streamTip = document.getElementById('streamTip');

        // 日志
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            let typeClass = '', prefix = '';
            switch (type) {
                case 'send': typeClass = 'log-send'; prefix = '发送'; break;
                case 'recv': typeClass = 'log-recv'; prefix = '接收'; break;
                case 'error': typeClass = 'log-error'; prefix = '错误'; break;
                default: prefix = '信息';
            }
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${prefix}</span>: ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            while (logPanel.children.length > MAX_LOG_ENTRIES) logPanel.removeChild(logPanel.firstChild);
        }

        // 应用视频流地址
        function applyCamStream() {
            const ip = document.getElementById('camAddress').value.trim();
            if (!ip) {
                streamTip.textContent = '请输入摄像头IP';
                return;
            }

            // 1. 加载前：显示“连接中”提示，隐藏图片
            streamTip.style.display = 'block';
            streamTip.textContent = '⏳ 正在连接视频流...';
            streamImg.style.display = 'none';

            // 2. 给图片加时间戳防缓存
            streamImg.src = `http://${ip}:81/stream?t=${Date.now()}`;

            // 3. 加载成功：隐藏提示，显示图片
            streamImg.onload = function() {
                streamTip.style.display = 'none';
                streamImg.style.display = 'block';
            };

            // 4. 加载失败：显示错误提示，隐藏图片
            streamImg.onerror = function() {
                streamTip.style.display = 'block';
                streamTip.innerHTML = '❌ 视频流加载失败<br>请检查IP地址或设备状态';
                streamImg.style.display = 'none';
            };
        }

        // WebSocket 连接
        function connect() {
            const ip = wsAddress.value.trim();
            if (!ip) { log('请输入ESP32 IP', 'error'); return; }
            const wsUrl = `ws://${ip}:${WS_PORT}`;
            log(`正在连接: ${wsUrl}`);
            
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                isConnected = true;
                updateStatus(true);
                connectBtn.textContent = '断开';
                log('连接成功', 'recv');
                sendCmd('status');
            };
            ws.onmessage = (e) => {
                log(e.data, 'recv');
                const match = e.data.match(/ok: speed changed to (\d+)/);
                if (match) {
                    const s = parseInt(match[1]);
                    speedSlider.value = s;
                    speedValue.textContent = s;
                }
            };
            ws.onclose = () => {
                isConnected = false;
                updateStatus(false);
                connectBtn.textContent = '连接';
            };
            ws.onerror = (err) => log('连接失败', 'error');
        }

        function disconnect() { if (ws) ws.close(); }
        function toggleConnection() { isConnected ? disconnect() : connect(); }
        function updateStatus(c) {
            c ? (statusDot.classList.add('connected'), statusText.textContent = '已连接')
               : (statusDot.classList.remove('connected'), statusText.textContent = '未连接');
        }

        // 发送指令
        function sendCmd(cmd) {
            if (!isConnected || !ws) { log('未连接', 'error'); return; }
            ws.send(cmd);
            log(cmd, 'send');
        }

        // 速度
        speedSlider.addEventListener('input', () => speedValue.textContent = speedSlider.value);
        speedSlider.addEventListener('change', () => {
            const s = speedSlider.value;
            if (isConnected) { ws.send(`chgspeed:${s}`); log(`chgspeed:${s}`, 'send'); }
        });

        // 自定义指令
        function sendCustomCmd() {
            const cmd = document.getElementById('cmdInput').value.trim();
            if (!cmd || !isConnected) return;
            ws.send(cmd);
            log(cmd, 'send');
            document.getElementById('cmdInput').value = '';
        }

        // 初始化
        window.addEventListener('load', () => {
            const savedIp = localStorage.getItem('esp32_ip');
            if (savedIp) wsAddress.value = savedIp;
            
            const savedCam = localStorage.getItem('cam_ip');
            if (savedCam) {
                camAddress.value = savedCam;
                applyCamStream();
            }
            
            log('页面已加载，可输入IP连接');
        });

        wsAddress.addEventListener('change', () => localStorage.setItem('esp32_ip', wsAddress.value));
    </script>
</body>
</html>
