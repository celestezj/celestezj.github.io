<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESP32 小车控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-text {
            font-size: 14px;
            color: #ccc;
        }

        .config-panel {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: background 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        .control-btn {
            aspect-ratio: 1;
            padding: 0;
            font-size: 24px;
            border-radius: 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
        }

        .control-btn:hover {
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .control-btn:active {
            background: linear-gradient(135deg, #00a8cc 0%, #5a1f8a 100%);
        }

        .control-btn.empty {
            background: transparent;
            pointer-events: none;
        }

        .control-btn.empty:hover {
            box-shadow: none;
        }

        .stop-btn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%) !important;
        }

        .stop-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 65, 108, 0.4) !important;
        }

        .log-panel {
            width: 100%;
            max-width: 400px;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 20px;
        }

        /* 指令输入区域 */
        .command-panel {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 速度滑轨样式 */
        .speed-control {
            margin-bottom: 15px;
        }

        .speed-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .speed-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            color: #fff;
            min-width: 50px;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }

        /* 指令输入样式 */
        .cmd-input-group {
            display: flex;
            gap: 10px;
        }

        .cmd-input-group input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: background 0.3s;
        }

        .cmd-input-group input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        .cmd-input-group input[type="text"]::placeholder {
            color: #888;
        }

        .cmd-btn {
            padding: 10px 20px !important;
            font-size: 13px !important;
        }

        .log-entry {
            margin-bottom: 3px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-time {
            color: #666;
        }

        .log-send {
            color: #00d4ff;
        }

        .log-recv {
            color: #00ff88;
        }

        .log-error {
            color: #ff4444;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 20px;
            }

            .control-panel {
                gap: 10px;
            }

            .control-btn {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>🚗 ESP32 小车控制</h1>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">未连接</span>
    </div>

    <div class="config-panel">
        <div class="input-group">
            <input type="text" id="wsAddress" placeholder="输入ESP32 IP，如 192.168.1.100" value="">
            <button id="connectBtn" onclick="toggleConnection()">连接</button>
        </div>
    </div>

    <!-- 指令输入和速度控制面板 -->
    <div class="command-panel">
        <!-- 速度滑轨 -->
        <div class="speed-control">
            <div class="speed-label">
                <span>速度控制</span>
                <span class="speed-value" id="speedValue">127</span>
            </div>
            <input type="range" id="speedSlider" min="0" max="255" value="127">
        </div>

        <!-- 指令输入 -->
        <div class="panel-title">自定义指令</div>
        <div class="cmd-input-group">
            <input type="text" id="cmdInput" placeholder="输入指令，如: forward, backward, stop, status..."
                   onkeypress="if(event.key==='Enter')sendCustomCmd()">
            <button class="cmd-btn" onclick="sendCustomCmd()">发送</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="control-btn empty"></div>
        <button class="control-btn" id="btnForward"
            onmousedown="sendCmd('forward')"
            onmouseup="sendCmd('stop')"
            ontouchstart="sendCmd('forward'); event.preventDefault();"
            ontouchend="sendCmd('stop'); event.preventDefault();"
            oncontextmenu="return false;">▲</button>
        <div class="control-btn empty"></div>

        <button class="control-btn" id="btnLeft"
            onmousedown="sendCmd('left')"
            onmouseup="sendCmd('stop')"
            ontouchstart="sendCmd('left'); event.preventDefault();"
            ontouchend="sendCmd('stop'); event.preventDefault();"
            oncontextmenu="return false;">◀</button>
        <button class="control-btn stop-btn" id="btnStop"
            onclick="sendCmd('stop')"
            oncontextmenu="return false;">⏹</button>
        <button class="control-btn" id="btnRight"
            onmousedown="sendCmd('right')"
            onmouseup="sendCmd('stop')"
            ontouchstart="sendCmd('right'); event.preventDefault();"
            ontouchend="sendCmd('stop'); event.preventDefault();"
            oncontextmenu="return false;">▶</button>

        <div class="control-btn empty"></div>
        <button class="control-btn" id="btnBackward"
            onmousedown="sendCmd('backward')"
            onmouseup="sendCmd('stop')"
            ontouchstart="sendCmd('backward'); event.preventDefault();"
            ontouchend="sendCmd('stop'); event.preventDefault();"
            oncontextmenu="return false;">▼</button>
        <div class="control-btn empty"></div>
    </div>

    <div class="log-panel" id="logPanel">
        <div class="log-entry"><span class="log-time">[系统]</span> 等待连接...</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const WS_PORT = 81;  // WebSocket 端口
        const MAX_LOG_ENTRIES = 50;  // 日志最大条目数

        // ==================== 全局变量 ====================
        let ws = null;
        let isConnected = false;
        let reconnectTimer = null;
        let currentCommand = null;  // 当前正在执行的命令

        // ==================== DOM 元素 ====================
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const wsAddress = document.getElementById('wsAddress');
        const connectBtn = document.getElementById('connectBtn');
        const logPanel = document.getElementById('logPanel');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        // ==================== 日志函数 ====================
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            let typeClass = '';
            let prefix = '';

            switch (type) {
                case 'send':
                    typeClass = 'log-send';
                    prefix = '发送';
                    break;
                case 'recv':
                    typeClass = 'log-recv';
                    prefix = '接收';
                    break;
                case 'error':
                    typeClass = 'log-error';
                    prefix = '错误';
                    break;
                default:
                    prefix = '信息';
            }

            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${prefix}</span>: ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;

            // 限制日志条目数
            while (logPanel.children.length > MAX_LOG_ENTRIES) {
                logPanel.removeChild(logPanel.firstChild);
            }
        }

        // ==================== WebSocket 连接 ====================
        function connect() {
            const ip = wsAddress.value.trim();
            if (!ip) {
                log('请输入 ESP32 的 IP 地址', 'error');
                return;
            }

            const wsUrl = `ws://${ip}:${WS_PORT}`;
            log(`正在连接到 ${wsUrl}...`);

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = function() {
                    isConnected = true;
                    updateStatus(true);
                    log('WebSocket 连接成功', 'recv');
                    connectBtn.textContent = '断开';

                    // 发送测试消息
                    sendCmd('status');
                };

                ws.onmessage = function(event) {
                    log(event.data, 'recv');
                    // 处理 chgspeed 响应，同步滑轨数值
                    const response = event.data;
                    console.log(response);
                    if (response && response.includes('ok: speed changed to')) {
                        // 尝试从响应中提取速度值
                        // 匹配 "ok: speed changed to XXX"
                        const match = response.match(/ok: speed changed to (\d+)/);
                        if (match) {
                            const newSpeed = parseInt(match[1], 10);
                            if (newSpeed >= 0 && newSpeed <= 255) {
                                // 更新滑轨和显示值
                                speedSlider.value = newSpeed;       // 全局变量
                                speedValue.textContent = newSpeed;  // 全局变量
                                // log(`滑轨已同步到速度: ${newSpeed}`, 'info');
                            }
                        }
                    }
                };

                ws.onclose = function() {
                    isConnected = false;
                    updateStatus(false);
                    log('WebSocket 连接已断开');
                    connectBtn.textContent = '连接';
                    ws = null;
                };

                ws.onerror = function(error) {
                    log('WebSocket 错误: ' + (error.message || '连接失败'), 'error');
                };
            } catch (e) {
                log('创建 WebSocket 失败: ' + e.message, 'error');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        // ==================== UI 更新 ====================
        function updateStatus(connected) {
            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = '已连接';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = '未连接';
            }
        }

        // ==================== 指令发送 ====================
        function sendCmd(cmd) {
            if (!isConnected || !ws) {
                log('未连接到小车，无法发送指令: ' + cmd, 'error');
                return;
            }

            // 记录当前命令
            currentCommand = cmd;

            ws.send(cmd);
            log(cmd, 'send');
        }

        // ==================== 键盘控制 ====================
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (!isConnected) return;

            // 防止重复触发（按住不放）
            if (e.repeat) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    sendCmd('forward');
                    document.getElementById('btnForward').style.transform = 'scale(0.95)';
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    sendCmd('backward');
                    document.getElementById('btnBackward').style.transform = 'scale(0.95)';
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    sendCmd('left');
                    document.getElementById('btnLeft').style.transform = 'scale(0.95)';
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    sendCmd('right');
                    document.getElementById('btnRight').style.transform = 'scale(0.95)';
                    break;
                case ' ':
                    sendCmd('stop');
                    document.getElementById('btnStop').style.transform = 'scale(0.95)';
                    break;
            }
        });

        document.addEventListener('keyup', function(e) {
            if (e.target.tagName === 'INPUT') return;
            // 松开按键时发送停止指令
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                case 'ArrowDown':
                case 's':
                case 'S':
                case 'ArrowLeft':
                case 'a':
                case 'A':
                case 'ArrowRight':
                case 'd':
                case 'D':
                    sendCmd('stop');
                    break;
                case ' ':
                    // 空格键不需要重复发送停止
                    break;
            }

            // 恢复按钮样式
            document.getElementById('btnForward').style.transform = '';
            document.getElementById('btnBackward').style.transform = '';
            document.getElementById('btnLeft').style.transform = '';
            document.getElementById('btnRight').style.transform = '';
            document.getElementById('btnStop').style.transform = '';
        });

        // 页面加载完成后的初始化
        window.addEventListener('load', function() {
            log('页面加载完成，请输入ESP32的IP地址并连接');

            // 尝试从本地存储读取上次使用的IP
            const savedIp = localStorage.getItem('esp32_ip');
            if (savedIp) {
                wsAddress.value = savedIp;
            }

            // 读取保存的速度值
            /*const savedSpeed = localStorage.getItem('esp32_speed');
            if (savedSpeed) {
                speedSlider.value = savedSpeed;
                speedValue.textContent = savedSpeed;
            } else */{
                speedSlider.value = 127;
                speedValue.textContent = 127;
            }
        });

        // 保存IP到本地存储
        wsAddress.addEventListener('change', function() {
            localStorage.setItem('esp32_ip', wsAddress.value);
        });

        // ==================== 速度滑轨控制 ====================
        function onSpeedChange(value) {
            const speed = parseInt(value);
            speedValue.textContent = speed;

            // 保存速度到本地存储
            // localStorage.setItem('esp32_speed', speed);

            // 如果已连接，发送速度变更指令
            if (isConnected && ws) {
                const cmd = `chgspeed:${speed}`;
                ws.send(cmd);
                log(cmd, 'send');
            } else {
                log(`速度已设置为 ${speed} (未连接，将在连接后生效)`, 'info');
            }
        }
        // 滑动时实时更新数字
        speedSlider.addEventListener('input', () => {
            speedValue.textContent = speedSlider.value;
        });
        // 松开时发送指令
        speedSlider.addEventListener('change', () => {
            onSpeedChange(speedSlider.value);
        });

        // ==================== 自定义指令输入 ====================
        function sendCustomCmd() {
            const cmdInput = document.getElementById('cmdInput');
            const cmd = cmdInput.value.trim();

            if (!cmd) {
                log('请输入指令', 'error');
                return;
            }

            if (!isConnected || !ws) {
                log('未连接到小车，无法发送指令', 'error');
                return;
            }

            // 发送指令
            ws.send(cmd);
            log(cmd, 'send');

            // 清空输入框
            cmdInput.value = '';
        }
    </script>
</body>
</html>
